name: Build Signed APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Android NDK
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/lib/android/sdk/ndk
            /usr/local/lib/android/sdk/ndk-bundle
          key: ${{ runner.os }}-ndk-r25b
          restore-keys: |
            ${{ runner.os }}-ndk-

      - name: Install Android NDK r25b
        run: |
          if [ ! -d "/usr/local/lib/android/sdk/ndk/25.2.9519653" ]; then
            echo "Installing NDK r25b..."
            yes | sdkmanager "ndk;25.2.9519653" --channel=0
          else
            echo "NDK r25b already cached."
          fi

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK (Debug)
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vpn-engine-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Build APK (Release Unsigned)
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: vpn-engine-release-apk
          path: app/build/outputs/apk/release/app-release-unsigned.apk
